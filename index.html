  <style>
    body { background: #f8f9fa; padding: 20px; }
    .topic-card {
      cursor: pointer; transition: transform 0.2s; height: 120px;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; border-radius: 16px;
    }
    .topic-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px rgba(0,0,0,0.12); }
    .topic-card .icon { font-size: 2.5rem; }
    .topic-card .name { font-size: 1rem; font-weight: 600; margin-top: 6px; }
    .sentence-card {
      background: white; border-radius: 12px; padding: 16px;
      margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .sentence-text { font-size: 1.1rem; font-weight: 500; margin-bottom: 10px; }
    .btn-sound { min-width: 100px; }
    #backBtn { cursor: pointer; color: #0d6efd; font-weight: 500; }
    #backBtn:hover { text-decoration: underline; }
    .recording-indicator { color: #dc3545; font-weight: 600; display: none; }
    .score-badge {
      font-size: 0.85rem; font-weight: 700; padding: 4px 10px;
      border-radius: 20px; display: inline-block;
    }
    .score-excellent { background: #d4edda; color: #155724; }
    .score-good { background: #fff3cd; color: #856404; }
    .score-fair { background: #ffeeba; color: #856404; }
    .score-poor { background: #f8d7da; color: #721c24; }
    .score-none { background: #e2e3e5; color: #383d41; }
    .accent-selector { max-width: 220px; }
    .listening-indicator { color: #0d6efd; font-weight: 600; display: none; }
  </style>
</head>

    let currentTopicId = null;
    let currentSentences = [];
    let mediaRecorder = null;
    let audioChunks = [];
    let currentRecordingId = null;
    let currentSentenceText = '';
    let recognition = null;
    let transcriptBuffer = '';
    let selectedVoice = null;

    document.addEventListener('DOMContentLoaded', () => {
      renderTopics();
      populateAccents();
    });

    function populateAccents() {
      const sel = document.getElementById('accentSelect');
      const saved = localStorage.getItem('preferredAccent') || '';
      const populate = () => {
        const voices = window.speechSynthesis.getVoices();
        const seen = new Set();
        sel.innerHTML = '<option value="">Default voice</option>';
        voices.forEach(v => {
          if (v.lang && v.lang.startsWith('en') && !seen.has(v.lang)) {
            seen.add(v.lang);
            const label = v.lang.replace('en-', '').toUpperCase();
            const names = { US: 'American', GB: 'British', AU: 'Australian', IN: 'Indian', CA: 'Canadian' };
            const display = names[label] || label;
            const opt = document.createElement('option');
            opt.value = v.lang;
            opt.textContent = `${display} (${v.lang})`;
            if (v.lang === saved) opt.selected = true;
            sel.appendChild(opt);
          }
        });
        if (saved) updateSelectedVoice(saved);
      };
      populate();
      if (window.speechSynthesis.onvoiceschanged !== undefined) {
        window.speechSynthesis.onvoiceschanged = populate;
      }
    }

    document.getElementById('accentSelect').addEventListener('change', e => {
      const val = e.target.value;
      localStorage.setItem('preferredAccent', val);
      updateSelectedVoice(val);
    });

    function updateSelectedVoice(lang) {
      if (!lang) { selectedVoice = null; return; }
      const voices = window.speechSynthesis.getVoices();
      selectedVoice = voices.find(v => v.lang === lang) || null;
    }

    function renderTopics() {
      const container = document.getElementById('topicContainer');
      container.innerHTML = TOPICS.map(t => `
        <div class="col-6 col-md-4 col-lg-3">
          <div class="topic-card card" onclick="selectTopic(${t.id}, '${t.name}')">
            <div class="icon">${t.icon}</div>
            <div class="name">${t.name}</div>
          </div>
        </div>
      `).join('');
    }

    function selectTopic(id, name) {
      currentTopicId = id;
      document.getElementById('topicContainer').style.display = 'none';
      document.getElementById('sentencePanel').style.display = 'block';
      document.getElementById('topicTitle').textContent = name;
      loadRandomSentences(id);
    }

    document.getElementById('backBtn').addEventListener('click', () => {
      currentTopicId = null;
      document.getElementById('topicContainer').style.display = '';
      document.getElementById('sentencePanel').style.display = 'none';
    });

    document.getElementById('randomizeBtn').addEventListener('click', () => {
      if (currentTopicId) loadRandomSentences(currentTopicId);
    });

    function loadRandomSentences(topicId) {
      const all = SENTENCES[topicId] || [];
      const shuffled = all.sort(() => Math.random() - 0.5);
      renderSentences(shuffled.slice(0, 10));
    }

    function renderSentences(sentences) {
      currentSentences = sentences;
      const container = document.getElementById('sentenceContainer');
      container.innerHTML = sentences.map(s => {
        const storedKey = `recording_${currentTopicId}_${s.id}`;
        const scoreKey = `score_${currentTopicId}_${s.id}`;
        const hasRecording = localStorage.getItem(storedKey);
        const savedScore = localStorage.getItem(scoreKey);
        const recordLabel = hasRecording ? ' Re-record' : ' Record';
        const scoreHtml = savedScore !== null
          ? renderScoreBadge(parseInt(savedScore, 10))
          : '<span class="score-badge score-none">Not scored</span>';
        return `
          <div class="sentence-card" data-id="${s.id}">
            <div class="sentence-text">${s.text}</div>
            <div class="d-flex align-items-center gap-2 flex-wrap">
              <button class="btn btn-primary btn-sm btn-sound" onclick="listenSentence('${s.text.replace(/'/g, "\\'")}')"> Listen</button>
              <button class="btn btn-outline-secondary btn-sm btn-sound record-btn" onclick="startRecording(${currentTopicId}, ${s.id}, '${s.text.replace(/'/g, "\\'")}')">${recordLabel}</button>
              <button class="btn btn-success btn-sm btn-sound play-btn" onclick="playRecording(${currentTopicId}, ${s.id})" style="${hasRecording ? '' : 'display:none'}"> My Voice</button>
              <span id="scoreDisplay_${currentTopicId}_${s.id}">${scoreHtml}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderScoreBadge(score) {
      let cls = 'score-poor';
      if (score >= 80) cls = 'score-excellent';
      else if (score >= 60) cls = 'score-good';
      else if (score >= 40) cls = 'score-fair';
      return `<span class="score-badge ${cls}">Score: ${score}%</span>`;
    }

    function listenSentence(text) {
      window.speechSynthesis.cancel();
      document.getElementById('listeningIndicator').style.display = 'block';
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.9;
      if (selectedVoice) utterance.voice = selectedVoice;
      utterance.onend = () => {
        document.getElementById('listeningIndicator').style.display = 'none';
      };
      window.speechSynthesis.speak(utterance);
    }

    function startRecording(topicId, sentenceId, sentenceText) {
      const recordingId = `recording_${topicId}_${sentenceId}`;
      const existing = localStorage.getItem(recordingId);

      if (existing && !confirm('Overwrite previous recording and re-evaluate?')) return;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        alert('Recording not supported in this browser.');
        return;
      }

      if (mediaRecorder && mediaRecorder.state === 'recording') {
        stopRecording();
        return;
      }

      currentRecordingId = recordingId;
      currentSentenceText = sentenceText;
      audioChunks = [];
      transcriptBuffer = '';

      navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = () => {
          const blob = new Blob(audioChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onloadend = () => {
            localStorage.setItem(currentRecordingId, reader.result);
            stream.getTracks().forEach(t => t.stop());
            evaluateSpeech(topicId, sentenceId, sentenceText);
            renderSentencesForTopic();
          };
          reader.readAsDataURL(blob);
          document.getElementById('recordingIndicator').style.display = 'none';
        };
        mediaRecorder.start();
        document.getElementById('recordingIndicator').style.display = 'block';
        document.querySelectorAll('.record-btn').forEach(b => b.disabled = true);
        mediaRecorder.addEventListener('start', () => {
          document.querySelectorAll('.record-btn').forEach(b => b.disabled = false);
          const btns = document.querySelectorAll('.record-btn');
          btns.forEach(b => b.textContent = ' Stop');
        });

        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          recognition = new SpeechRecognition();
          recognition.lang = 'en-US';
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.onresult = e => {
            transcriptBuffer = '';
            for (let i = e.resultIndex; i < e.results.length; i++) {
              if (e.results[i].isFinal) {
                transcriptBuffer += e.results[i][0].transcript + ' ';
              }
            }
            transcriptBuffer = transcriptBuffer.trim();
          };
          recognition.onerror = () => {};
          recognition.start();
        }
      }).catch(err => alert('Microphone access denied.'));
    }

    function stopRecording() {
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
        recognition = null;
      }
      const btns = document.querySelectorAll('.record-btn');
      btns.forEach(b => b.textContent = ' Record');
    }

    function evaluateSpeech(topicId, sentenceId, originalText) {
      const userText = transcriptBuffer || '';
      if (!userText) return;

      const score = calculateSimilarity(originalText, userText);
      const scoreKey = `score_${topicId}_${sentenceId}`;
      localStorage.setItem(scoreKey, score.toString());

      const display = document.getElementById(`scoreDisplay_${topicId}_${sentenceId}`);
      if (display) {
        display.innerHTML = renderScoreBadge(score);
      }
    }

    function calculateSimilarity(original, userSpeech) {
      const normalize = s => s.toLowerCase()
        .replace(/[^\w\s']/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      const origWords = normalize(original).split(' ');
      const userWords = normalize(userSpeech).split(' ');

      if (origWords.length === 0) return 0;

      const remaining = [...userWords];
      let matched = 0;

      for (const word of origWords) {
        const idx = remaining.indexOf(word);
        if (idx !== -1) {
          matched++;
          remaining.splice(idx, 1);
        }
      }

      return Math.round((matched / origWords.length) * 100);
    }

    function renderSentencesForTopic() {
      renderSentences(currentSentences);
    }

    function playRecording(topicId, sentenceId) {
      const data = localStorage.getItem(`recording_${topicId}_${sentenceId}`);
      if (!data) return;
      const audio = new Audio(data);
      audio.play();
    }
